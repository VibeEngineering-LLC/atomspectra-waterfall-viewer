name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        include:
          # 3.14 wheels for PySide6/scipy on Linux may lag; keep it non-blocking.
          - python-version: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # PySide6 import needs these even under QT_QPA_PLATFORM=offscreen.
      - name: System libraries for headless Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run tests
        continue-on-error: ${{ matrix.experimental || false }}
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
        run: pytest -q